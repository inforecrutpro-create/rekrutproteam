<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RekrutPro</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

header {
  background: #111827;
  color: white;
  padding: 20px;
  text-align: center;
}

.hero {
  background: url("https://images.pexels.com/photos/3184465/pexels-photo-3184465.jpeg") center/cover;
  height: 400px;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-size: 30px;
}

.section {
  padding: 40px;
  text-align: center;
}

.services {
  display: flex;
  gap: 20px;
  justify-content: center;
}

.card {
  width: 300px;
  background: #fff;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

button {
  background: #facc15;
  border: none;
  padding: 10px;
  cursor: pointer;
}

/* POPUP */
#popup {
  display: none;
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
}

.popup-box {
  background: white;
  padding: 20px;
  width: 300px;
}

</style>
</head>

<body>

<header>
  <h1>RekrutPro</h1>
</header>

<div class="hero">
  Професійний рекрутинг
</div>

<div class="section">
  <h2>Наші послуги</h2>

  <div class="services">

    <div class="card">
      <img src="https://images.pexels.com/photos/3184292/pexels-photo-3184292.jpeg">
      <h3>Пошук персоналу</h3>
      <button onclick="openPopup()">Замовити консультацію</button>
    </div>

    <div class="card">
      <img src="https://images.pexels.com/photos/1181615/pexels-photo-1181615.jpeg">
      <h3>IT рекрутинг</h3>
      <button onclick="openPopup()">Замовити консультацію</button>
    </div>

  </div>
</div>

<!-- POPUP -->
<div id="popup">
  <div class="popup-box">
    <span onclick="closePopup()" style="cursor:pointer;">X</span>
    <h3>Заявка</h3>

    <form action="https://formspree.io/f/xnjoaydg" method="POST">
      <input type="text" name="name" placeholder="Ім'я" required style="width:100%; margin:5px 0;">
      <input type="tel" name="phone" placeholder="Телефон" required style="width:100%; margin:5px 0;">
      <button type="submit">Відправити</button>
    </form>

  </div>
</div>

<script>
function openPopup() {
  document.getElementById("popup").style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
